<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZeroBezel PDF Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* ── Fixed header ─────────────────────────────────────────────────── */
        #top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 54px;
            background: rgba(15,23,42,0.96);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            gap: 10px;
            z-index: 100;
        }

        .bar-left { display: flex; align-items: center; gap: 10px; }

        #top-bar h1 {
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        #file-select {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.14);
            color: #f8fafc;
            padding: 5px 9px;
            border-radius: 8px;
            outline: none;
            font-size: 0.8rem;
            max-width: 170px;
        }
        #file-select option { background: #1e293b; }

        #page-count {
            font-size: 0.78rem;
            color: #475569;
            white-space: nowrap;
        }

        /* ── Scrollable viewer — positioned between header and zoom bar ───── */
        #viewer-container {
            position: fixed;
            top: 54px;
            left: 0; right: 0;
            bottom: 54px;
            overflow-x: auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: #0f172a;
            padding: 16px;
        }

        #pages-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .page-wrapper {
            background: white;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            overflow: hidden;
            flex-shrink: 0;
        }

        canvas { display: block; }

        /* ── Fixed zoom bar ───────────────────────────────────────────────── */
        #zoom-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 54px;
            background: rgba(15,23,42,0.96);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            z-index: 100;
        }

        .zbtn {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            color: #f8fafc;
            padding: 10px 22px;
            font-size: 1.1rem;
            cursor: pointer;
            touch-action: manipulation;
            transition: background 0.15s;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zbtn:first-child { border-radius: 8px 0 0 8px; }
        .zbtn:last-child  { border-radius: 0 8px 8px 0; }
        .zbtn:hover, .zbtn:active { background: rgba(56,189,248,0.22); }

        #zoom-label {
            border: 1px solid rgba(255,255,255,0.12);
            border-left: none; border-right: none;
            color: #94a3b8;
            padding: 0 14px;
            font-size: 0.82rem;
            min-width: 60px;
            text-align: center;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
        }

        /* ── Status pill ──────────────────────────────────────────────────── */
        #status {
            position: fixed;
            bottom: 62px;
            right: 14px;
            background: rgba(15,23,42,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4px 11px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #38bdf8;
            z-index: 200;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="bar-left">
        <h1>📄 PDF</h1>
        <select id="file-select"><option value="">Loading…</option></select>
    </div>
    <span id="page-count">–</span>
</div>

<div id="viewer-container">
    <div id="pages-parent">
        <div id="pages-container"></div>
    </div>
</div>

<div id="zoom-bar">
    <button class="zbtn" id="btn-out">−</button>
    <span id="zoom-label">100%</span>
    <button class="zbtn" id="btn-fit">Fit</button>
    <button class="zbtn" id="btn-in">+</button>
</div>

<div id="status">Loading…</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const vc        = document.getElementById('viewer-container');
    const pagesParent = document.getElementById('pages-parent');
    const pagesDiv  = document.getElementById('pages-container');
    const fileSelect= document.getElementById('file-select');
    const pageCount = document.getElementById('page-count');
    const zoomLabel = document.getElementById('zoom-label');
    const statusEl  = document.getElementById('status');

    let pdfDoc    = null;
    let baseScale  = 1.0;
    let zoomLevel = 1.0;
    let baseWidth  = 0;
    let baseHeight = 0;
    let pdfFromRemote = false;

    function st(t)     { statusEl.textContent = t; }
    function updLabel(){ zoomLabel.textContent = Math.round(zoomLevel * 100) + '%'; }

    /* ── Fetch list ─────────────────────────────────────────────────────── */
    async function fetchList() {
        try {
            const res   = await fetch('/list');
            const files = await res.json();
            const pdfs  = files.filter(f => f.type === 'pdf');
            fileSelect.innerHTML = '';
            if (!pdfs.length) {
                fileSelect.innerHTML = '<option>No PDFs</option>';
                st('No PDFs found'); return;
            }
            pdfs.forEach(f => {
                const o = document.createElement('option');
                o.value = f.id; o.textContent = f.name;
                fileSelect.appendChild(o);
            });
            fileSelect.value = pdfs[0].id;
            await loadPDF(pdfs[0].id);
        } catch(e) { st('Error: ' + e.message); }
    }

    /* ── Load PDF ───────────────────────────────────────────────────────── */
    async function loadPDF(docId) {
        if (!docId) return;
        st('Loading…');
        pagesDiv.innerHTML = '';
        try {
            pdfDoc = await pdfjsLib.getDocument('/file?id=' + encodeURIComponent(docId)).promise;
            pageCount.textContent = pdfDoc.numPages + ' pages';
            zoomLevel = 1.0;
            updLabel();
            await renderAll();
        } catch(e) { st('Error: ' + e.message); }
    }

    /* ── Render all pages ───────────────────────────────────────────────── */
    async function renderAll() {
        pagesDiv.innerHTML = '';
        st('Rendering…');
        
        const fp1  = await pdfDoc.getPage(1);
        const vp1 = fp1.getViewport({ scale: 1 });
        baseScale  = (vc.clientWidth - 32) / vp1.width;
        
        const renderScaleMultiplier = 1.5;

        for (let n = 1; n <= pdfDoc.numPages; n++) {
            const page = await pdfDoc.getPage(n);
            const pageVp = page.getViewport({ scale: baseScale });
            const pageWidth = pageVp.width;
            const pageHeight = pageVp.height;

            const wrap = document.createElement('div');
            wrap.className = 'page-wrapper';
            wrap.style.width  = pageWidth + 'px';
            wrap.style.height = pageHeight + 'px';
            if (n < pdfDoc.numPages) {
                wrap.style.marginBottom = '14px';
            }

            const cv  = document.createElement('canvas');
            const renderVp = page.getViewport({ scale: baseScale * renderScaleMultiplier });
            cv.width  = renderVp.width;
            cv.height = renderVp.height;
            cv.style.width  = '100%';
            cv.style.height = '100%';

            wrap.appendChild(cv);
            pagesDiv.appendChild(wrap);

            await page.render({ canvasContext: cv.getContext('2d'), viewport: renderVp }).promise;
        }
        
        baseWidth = pagesDiv.scrollWidth;
        baseHeight = pagesDiv.scrollHeight;
        
        applyZoomLevel(zoomLevel);
        st('Ready');
    }

    /* ── Apply visual zoom using CSS transforms ── */
    function applyZoomLevel(lvl) {
        zoomLevel = Math.min(Math.max(lvl, 0.25), 4.0);
        updLabel();
        if (pagesParent && pagesDiv) {
            pagesParent.style.width  = (baseWidth * zoomLevel) + 'px';
            pagesParent.style.height = (baseHeight * zoomLevel) + 'px';
            pagesDiv.style.width = baseWidth + 'px';
            pagesDiv.style.height = baseHeight + 'px';
            pagesDiv.style.transform = 'scale(' + zoomLevel + ')';
        }
    }

    /* ── Zoom ───────────────────────────────────────────────────────────── */
    function setZoom(lvl) {
        if (!pdfDoc) return;
        
        const rect = vc.getBoundingClientRect();
        const cx = rect.width / 2;
        const cy = rect.height / 2;
        
        const docX = cx + vc.scrollLeft;
        const docY = cy + vc.scrollTop;
        
        const oldZoom = zoomLevel;
        const newZoom = Math.min(Math.max(lvl, 0.25), 4.0);
        
        applyZoomLevel(newZoom);
        
        const scaleChange = newZoom / oldZoom;
        vc.scrollLeft = docX * scaleChange - cx;
        vc.scrollTop  = docY * scaleChange - cy;
        
        syncZoomAndScroll();
    }

    document.getElementById('btn-in') .addEventListener('click', () => setZoom(zoomLevel + 0.25));
    document.getElementById('btn-out').addEventListener('click', () => setZoom(zoomLevel - 0.25));
    document.getElementById('btn-fit').addEventListener('click', () => setZoom(1.0));
    
    fileSelect.addEventListener('change', e => {
        loadPDF(e.target.value);
        if (!pdfFromRemote && window.AndroidBridge) {
            window.AndroidBridge.sendEvent(JSON.stringify({
                app: 'pdf', action: 'open_file', id: e.target.value
            }));
        }
    });

    /* ── Scroll Listener (local) ── */
    vc.addEventListener('scroll', function () {
        if (pdfFromRemote || pinching) return;
        syncZoomAndScroll();
    }, { passive: true });

    /* ── Pinch zoom ─────────────────────────────────────────────────────── */
    let pDist0 = 0, pZoom0 = 1, pinching = false, pinchEndAt = 0;
    let pinchCenterDocX = 0, pinchCenterDocY = 0;
    let pinchCenterClientX = 0, pinchCenterClientY = 0;

    vc.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
            pinching = true;
            pDist0   = Math.hypot(e.touches[1].clientX - e.touches[0].clientX,
                                  e.touches[1].clientY - e.touches[0].clientY);
            pZoom0   = zoomLevel;

            pinchCenterClientX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            pinchCenterClientY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

            const rect = vc.getBoundingClientRect();
            pinchCenterDocX = (pinchCenterClientX - rect.left) + vc.scrollLeft;
            pinchCenterDocY = (pinchCenterClientY - rect.top) + vc.scrollTop;

            e.preventDefault();
        }
    }, { passive: false });

    vc.addEventListener('touchmove', e => {
        if (!pinching || e.touches.length < 2) return;
        e.preventDefault();
        const d = Math.hypot(e.touches[1].clientX - e.touches[0].clientX,
                             e.touches[1].clientY - e.touches[0].clientY);
        const newZoom = Math.min(Math.max(pZoom0 * (d / pDist0), 0.25), 4.0);
        
        applyZoomLevel(newZoom);

        const rect = vc.getBoundingClientRect();
        const currentMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const currentMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

        const scaleChange = newZoom / pZoom0;
        const newDocX = pinchCenterDocX * scaleChange;
        const newDocY = pinchCenterDocY * scaleChange;

        vc.scrollLeft = newDocX - (currentMidX - rect.left);
        vc.scrollTop  = newDocY - (currentMidY - rect.top);

        syncZoomAndScroll();
    }, { passive: false });

    vc.addEventListener('touchend', e => {
        if (pinching && e.touches.length < 2) {
            pinching   = false;
            pinchEndAt = Date.now();
            syncZoomAndScroll();
        }
    }, { passive: true });

    /* ── Double-tap zoom ────────────────────────────────────────────────── */
    let lastTap = 0;
    vc.addEventListener('touchend', e => {
        if (pinching || Date.now() - pinchEndAt < 500) return;
        const now = Date.now();
        if (now - lastTap < 280) {
            const touch = e.changedTouches[0];
            const rect = vc.getBoundingClientRect();
            const clientX = touch.clientX;
            const clientY = touch.clientY;
            
            const docX = (clientX - rect.left) + vc.scrollLeft;
            const docY = (clientY - rect.top) + vc.scrollTop;
            
            const oldZoom = zoomLevel;
            const newZoom = zoomLevel > 1.1 ? 1.0 : 2.0;
            
            applyZoomLevel(newZoom);
            
            const scaleChange = newZoom / oldZoom;
            vc.scrollLeft = docX * scaleChange - (clientX - rect.left);
            vc.scrollTop  = docY * scaleChange - (clientY - rect.top);
            
            syncZoomAndScroll();
        }
        lastTap = now;
    }, { passive: true });

    /* ── Ctrl+wheel ─────────────────────────────────────────────────────── */
    vc.addEventListener('wheel', e => {
        if (!e.ctrlKey) return;
        e.preventDefault();
        setZoom(zoomLevel + (e.deltaY < 0 ? 0.15 : -0.15));
    }, { passive: false });

    /* ── ZeroBezel PDF Sync ─────────────────────────────────────────────── */
    let syncTicking = false;
    function syncZoomAndScroll() {
        if (pdfFromRemote || syncTicking) return;
        syncTicking = true;
        requestAnimationFrame(function () {
            if (window.AndroidBridge) {
                var maxY = Math.max(1, vc.scrollHeight - vc.clientHeight);
                var maxX = Math.max(1, vc.scrollWidth  - vc.clientWidth);
                window.AndroidBridge.sendEvent(JSON.stringify({
                    app: 'pdf', action: 'zoom', level: zoomLevel
                }));
                window.AndroidBridge.sendEvent(JSON.stringify({
                    app: 'pdf', action: 'scroll',
                    x: Math.min(Math.max(vc.scrollLeft / maxX, 0), 1),
                    y: Math.min(Math.max(vc.scrollTop  / maxY, 0), 1)
                }));
            }
            syncTicking = false;
        });
    }

    window.__zbPageApplySync = function (jsonStr) {
        try {
            var data = JSON.parse(jsonStr);
            if (data.app !== 'pdf') return;
            pdfFromRemote = true;

            if (data.action === 'scroll') {
                var maxY = Math.max(1, vc.scrollHeight - vc.clientHeight);
                var maxX = Math.max(1, vc.scrollWidth  - vc.clientWidth);
                vc.scrollTop  = data.y * maxY;
                vc.scrollLeft = data.x * maxX;
                
                requestAnimationFrame(function () {
                    requestAnimationFrame(function () { pdfFromRemote = false; });
                });

            } else if (data.action === 'zoom') {
                if (Math.abs(data.level - zoomLevel) >= 0.01) {
                    applyZoomLevel(data.level);
                }
                pdfFromRemote = false;

            } else if (data.action === 'open_file') {
                if (fileSelect.value !== data.id) {
                    fileSelect.value = data.id;
                    loadPDF(data.id).then(function() { pdfFromRemote = false; });
                } else {
                    pdfFromRemote = false;
                }
            } else {
                pdfFromRemote = false;
            }
        } catch (e) {
            pdfFromRemote = false;
        }
    };

    /* ── Init ───────────────────────────────────────────────────────────── */
    fetchList();
</script>
</body>
</html>
