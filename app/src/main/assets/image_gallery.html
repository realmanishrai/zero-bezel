<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZeroBezel Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(160deg, #020617 0%, #0f172a 100%);
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* ── Fixed header ─────────────────────────────────────────────────── */
        #top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 12px;
            z-index: 100;
        }

        #top-bar h1 {
            font-size: 1.15rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #img-count { font-size: 0.78rem; color: #64748b; margin-left: auto; }

        /* ── Scrollable grid — positioned below header ────────────────────── */
        #grid-scroll {
            position: fixed;
            top: 56px;
            left: 0; right: 0; bottom: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 14px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }

        /* touch-action:manipulation removes 300ms delay; no preventDefault needed */
        .thumb {
            aspect-ratio: 1;
            border-radius: 13px;
            overflow: hidden;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            touch-action: manipulation;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .thumb:active { transform: scale(0.92); }
        .thumb:hover  {
            box-shadow: 0 6px 20px rgba(56,189,248,0.2);
            border-color: rgba(56,189,248,0.35);
        }

        .thumb img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ── LIGHTBOX (fixed, full-screen) ────────────────────────────────── */
        #lightbox {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0);
            visibility: hidden;
            transition: background 0.22s ease;
        }

        #lightbox.open {
            visibility: visible;
            background: rgba(0,0,0,0.96);
        }

        /* lightbox top bar */
        #lb-bar {
            flex-shrink: 0;
            height: 54px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 8px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        #lb-title {
            flex: 1;
            font-size: 0.88rem;
            color: #cbd5e1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        #lb-counter { font-size: 0.78rem; color: #475569; white-space: nowrap; }

        .lbtn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff;
            padding: 7px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            cursor: pointer;
            touch-action: manipulation;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .lbtn:hover { background: rgba(255,255,255,0.2); }
        #lb-close { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.3); }
        #lb-close:hover { background: rgba(239,68,68,0.38); }

        /* stage: fills remaining space, gestures handled here */
        #lb-stage {
            flex: 1 1 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        #lb-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
            will-change: transform;
        }

        .lb-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.42);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            width: 44px; height: 44px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            z-index: 3;
            transition: background 0.15s;
        }
        .lb-arrow:hover { background: rgba(56,189,248,0.3); color: #fff; }
        #lb-prev { left: 12px; }
        #lb-next { right: 12px; }

        /* bottom dots */
        #lb-dots {
            flex-shrink: 0;
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 7px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.45);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.22);
            cursor: pointer;
            touch-action: manipulation;
            transition: background 0.2s, transform 0.2s;
        }
        .dot.active { background: #38bdf8; transform: scale(1.45); }

        #status {
            position: fixed;
            bottom: 14px; right: 14px;
            background: rgba(15,23,42,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 4px 11px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #38bdf8;
            z-index: 300;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="top-bar">
    <h1>🖼️ Gallery</h1>
    <span id="img-count"></span>
</div>

<div id="grid-scroll">
    <div id="grid"></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
    <div id="lb-bar">
        <span id="lb-title">Image</span>
        <span id="lb-counter"></span>
        <button class="lbtn" id="lb-close">✕ Close</button>
    </div>

    <div id="lb-stage">
        <img id="lb-img" src="" alt="">
        <button class="lb-arrow" id="lb-prev">&#8249;</button>
        <button class="lb-arrow" id="lb-next">&#8250;</button>
    </div>

    <div id="lb-dots"></div>
</div>

<div id="status">Loading…</div>

<script>
/* ── State ────────────────────────────────────────────────────────────────── */
let images = [];
let curIdx = 0;

/* ── DOM refs ─────────────────────────────────────────────────────────────── */
const grid    = document.getElementById('grid');
const imgCnt  = document.getElementById('img-count');
const statusEl= document.getElementById('status');
const lightbox= document.getElementById('lightbox');
const lbImg   = document.getElementById('lb-img');
const lbTitle = document.getElementById('lb-title');
const lbCtr   = document.getElementById('lb-counter');
const lbDots  = document.getElementById('lb-dots');
const lbClose = document.getElementById('lb-close');
const lbPrev  = document.getElementById('lb-prev');
const lbNext  = document.getElementById('lb-next');
const stage   = document.getElementById('lb-stage');

function st(t) { statusEl.textContent = t; }

/* ── Fetch ────────────────────────────────────────────────────────────────── */
async function loadGallery() {
    try {
        const res = await fetch('/list');
        const all = await res.json();
        images    = all.filter(f => f.type === 'image');
        buildGrid();
        st(images.length ? 'Ready' : 'No images found');
    } catch(e) {
        st('Error: ' + e.message);
    }
}

/* ── Grid ─────────────────────────────────────────────────────────────────── */
function buildGrid() {
    grid.innerHTML = '';
    lbDots.innerHTML = '';
    imgCnt.textContent = images.length + (images.length === 1 ? ' photo' : ' photos');

    images.forEach((img, i) => {
        /* Thumbnail */
        const card = document.createElement('div');
        card.className = 'thumb';

        const el = document.createElement('img');
        el.src     = '/file?id=' + encodeURIComponent(img.id);
        el.alt     = img.name;
        el.loading = 'lazy';
        card.appendChild(el);

        /* click opens lightbox — touch-action:manipulation removes 300ms delay */
        card.addEventListener('click', () => openLightbox(i));
        grid.appendChild(card);

        /* Dot */
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.addEventListener('click', () => goTo(i));
        lbDots.appendChild(dot);
    });
}

/* ── Lightbox open/close ──────────────────────────────────────────────────── */
function openLightbox(i) {
    curIdx = i;
    resetT();
    lightbox.classList.add('open');
    showImg(i);
}

function closeLightbox() {
    lightbox.classList.remove('open');
    resetT();
}

function showImg(i) {
    const d = images[i];
    lbImg.src   = '/file?id=' + encodeURIComponent(d.id);
    lbTitle.textContent = d.name;
    lbCtr.textContent   = (i + 1) + ' / ' + images.length;
    lbPrev.style.opacity = i > 0               ? '1' : '0.25';
    lbNext.style.opacity = i < images.length-1 ? '1' : '0.25';
    lbDots.querySelectorAll('.dot').forEach((dot, j) => dot.classList.toggle('active', j === i));
}

lbClose.addEventListener('click', closeLightbox);
lbPrev.addEventListener('click', () => goTo(curIdx - 1, 'right'));
lbNext.addEventListener('click', () => goTo(curIdx + 1, 'left'));

document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  goTo(curIdx - 1, 'right');
    if (e.key === 'ArrowRight') goTo(curIdx + 1, 'left');
    if (e.key === 'Escape')     closeLightbox();
});

/* ── Animated image transition ────────────────────────────────────────────── */
function goTo(i, dir) {
    if (i < 0 || i >= images.length) return;
    dir = dir || (i > curIdx ? 'left' : 'right');
    curIdx = i;

    const outX = dir === 'left' ? '-110%' : '110%';
    lbImg.style.transition = 'transform 0.2s ease-out, opacity 0.2s';
    lbImg.style.transform  = 'translate(' + outX + ',0) scale(1)';
    lbImg.style.opacity    = '0';

    setTimeout(() => {
        const inX = dir === 'left' ? '110%' : '-110%';
        lbImg.style.transition = 'none';
        lbImg.style.transform  = 'translate(' + inX + ',0) scale(1)';
        lbImg.style.opacity    = '0';
        showImg(i);
        lbImg.getBoundingClientRect(); // force reflow
        lbImg.style.transition = 'transform 0.2s ease-out, opacity 0.2s';
        lbImg.style.transform  = 'translate(0,0) scale(1)';
        lbImg.style.opacity    = '1';
        tx = 0; ty = 0; sc = 1;
    }, 210);
}

/* ── Transform state ──────────────────────────────────────────────────────── */
let tx = 0, ty = 0, sc = 1;

function applyT(anim) {
    lbImg.style.transition = anim ? 'transform 0.2s ease-out' : 'none';
    lbImg.style.transform  = 'translate(' + tx + 'px,' + ty + 'px) scale(' + sc + ')';
}

function resetT() {
    tx = 0; ty = 0; sc = 1;
    lbImg.style.transition = 'none';
    lbImg.style.transform  = 'translate(0,0) scale(1)';
    lbImg.style.opacity    = '1';
}

function clampPan() {
    if (sc <= 1) { tx = 0; ty = 0; return; }
    const w  = lbImg.clientWidth  * sc;
    const h  = lbImg.clientHeight * sc;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const mx = Math.max(0, (w - vw) / 2);
    const my = Math.max(0, (h - vh) / 2);
    tx = Math.min(Math.max(tx, -mx), mx);
    ty = Math.min(Math.max(ty, -my), my);
}

/* ── Touch gesture engine ─────────────────────────────────────────────────── */
let pts       = {};
let gesture   = null;
let gStartTx  = 0, gStartTy = 0;
let gStartX   = 0, gStartY  = 0;
let pDist0    = 0, pSc0     = 1;
let pTx0      = 0, pTy0     = 0;
let pMx0      = 0, pMy0     = 0;

function ptCount() { return Object.keys(pts).length; }

stage.addEventListener('touchstart', e => {
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t => {
        pts[t.identifier] = { x: t.clientX, y: t.clientY };
    });

    const ids = Object.keys(pts);
    if (ids.length === 1) {
        gesture  = null;
        gStartTx = tx;   gStartTy = ty;
        gStartX  = pts[ids[0]].x;
        gStartY  = pts[ids[0]].y;
    } else if (ids.length === 2) {
        gesture  = 'pinch';
        const [a, b] = ids.map(id => pts[id]);
        pDist0 = Math.hypot(b.x - a.x, b.y - a.y);
        pSc0   = sc; pTx0 = tx; pTy0 = ty;
        pMx0   = (a.x + b.x) / 2;
        pMy0   = (a.y + b.y) / 2;
        lbImg.style.transition = 'none';
    }
}, { passive: false });

stage.addEventListener('touchmove', e => {
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t => {
        if (pts[t.identifier]) pts[t.identifier] = { x: t.clientX, y: t.clientY };
    });

    const ids = Object.keys(pts);

    if (gesture === 'pinch' && ids.length === 2) {
        const [a, b] = ids.map(id => pts[id]);
        const d   = Math.hypot(b.x - a.x, b.y - a.y);
        const mx  = (a.x + b.x) / 2;
        const my  = (a.y + b.y) / 2;
        sc = Math.min(Math.max(pSc0 * (d / pDist0), 0.5), 6);
        tx = pTx0 + (mx - pMx0);
        ty = pTy0 + (my - pMy0);
        clampPan();
        applyT(false);
        return;
    }

    if (ids.length === 1) {
        const p  = pts[ids[0]];
        const dx = p.x - gStartX;
        const dy = p.y - gStartY;

        if (!gesture && (Math.abs(dx) > 9 || Math.abs(dy) > 9)) {
            if (sc > 1.04)                          gesture = 'pan';
            else if (Math.abs(dx) >= Math.abs(dy))  gesture = 'swipe';
            else                                    gesture = 'dismiss';
            lbImg.style.transition = 'none';
        }

        if (gesture === 'pan') {
            tx = gStartTx + dx;
            ty = gStartTy + dy;
            clampPan();
            applyT(false);
        } else if (gesture === 'swipe') {
            lbImg.style.transform = 'translate(' + dx + 'px,0) scale(1)';
        } else if (gesture === 'dismiss') {
            lbImg.style.transform = 'translate(0,' + dy + 'px) scale(1)';
            const fade = Math.max(0, 1 - Math.abs(dy) / (window.innerHeight * 0.5));
            lightbox.style.background = 'rgba(0,0,0,' + (0.96 * fade) + ')';
        }
    }
}, { passive: false });

stage.addEventListener('touchend', e => {
    Array.from(e.changedTouches).forEach(t => delete pts[t.identifier]);
    const remaining = Object.keys(pts).length;

    if (gesture === 'pinch') {
        if (remaining < 2) {
            gesture = null;
            if (sc < 1.05) { sc = 1; tx = 0; ty = 0; applyT(true); }
        }
        return;
    }

    if (remaining > 0) return;

    const p = e.changedTouches[0];

    if (gesture === 'swipe') {
        const dx = p.clientX - gStartX;
        if      (dx < -65 && curIdx < images.length - 1) goTo(curIdx + 1, 'left');
        else if (dx >  65 && curIdx > 0)                 goTo(curIdx - 1, 'right');
        else { tx = 0; ty = 0; applyT(true); }
        gesture = null; return;
    }

    if (gesture === 'dismiss') {
        lightbox.style.background = '';
        const dy = p.clientY - gStartY;
        if (Math.abs(dy) > window.innerHeight * 0.2) closeLightbox();
        else { tx = 0; ty = 0; applyT(true); }
        gesture = null; return;
    }

    gesture = null;
}, { passive: true });

/* ── Double-tap zoom ──────────────────────────────────────────────────────── */
let lastTapMs = 0;
stage.addEventListener('touchend', e => {
    if (gesture) return;
    const now = Date.now();
    if (now - lastTapMs < 270 && ptCount() === 0) {
        e.preventDefault();
        if (sc > 1.05) {
            resetT(); applyT(true);
        } else {
            const t = e.changedTouches[0];
            const r = lbImg.getBoundingClientRect();
            sc = 2.5;
            tx = -(t.clientX - r.left - r.width  / 2) * (sc - 1);
            ty = -(t.clientY - r.top  - r.height / 2) * (sc - 1);
            clampPan();
            applyT(true);
        }
        lastTapMs = 0;
        return;
    }
    lastTapMs = now;
}, { passive: false });

/* ── Init ─────────────────────────────────────────────────────────────────── */
loadGallery();
</script>
</body>
</html>
