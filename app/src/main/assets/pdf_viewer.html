<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZeroBezel PDF Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* KEY FIX: html+body must have a fixed height so flex child can scroll */
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
        }

        header {
            flex-shrink: 0;
            width: 100%;
            padding: 10px 16px;
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            z-index: 100;
        }

        .title-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        select {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            color: #f8fafc;
            padding: 6px 10px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-size: 0.82rem;
            max-width: 180px;
        }
        select option { background: #1e293b; color: #f8fafc; }

        /* KEY FIX: viewer-container fills remaining space and scrolls */
        #viewer-container {
            flex: 1 1 0;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            background: #0f172a;
            padding: 20px 16px;
        }

        /* pages-container grows to content size, scrolling happens on parent */
        #pages-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .page-wrapper {
            background: white;
            border-radius: 6px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            overflow: hidden;
            flex-shrink: 0;
        }

        canvas {
            display: block;
        }

        #zoom-bar {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            padding: 8px 16px;
            background: rgba(15, 23, 42, 0.92);
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .zoom-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: #f8fafc;
            padding: 8px 18px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .zoom-btn:first-child { border-radius: 8px 0 0 8px; }
        .zoom-btn:last-child  { border-radius: 0 8px 8px 0; }
        .zoom-btn:hover { background: rgba(56,189,248,0.18); }

        #zoom-label {
            background: rgba(255,255,255,0.04);
            border-top: 1px solid rgba(255,255,255,0.12);
            border-bottom: 1px solid rgba(255,255,255,0.12);
            color: #94a3b8;
            padding: 8px 14px;
            font-size: 0.82rem;
            min-width: 56px;
            text-align: center;
        }

        #status {
            position: fixed;
            bottom: 60px;
            right: 16px;
            background: rgba(15,23,42,0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            color: #38bdf8;
            z-index: 200;
            pointer-events: none;
        }
    </style>
</head>
<body>

<header>
    <div class="title-area">
        <h1>📄 PDF</h1>
        <select id="file-select"><option value="">Loading…</option></select>
    </div>
    <span id="page-count" style="font-size:0.82rem;color:#94a3b8;">Pages: –</span>
</header>

<div id="viewer-container">
    <div id="pages-container"></div>
</div>

<!-- Permanent zoom controls at bottom -->
<div id="zoom-bar">
    <button class="zoom-btn" id="btn-zoom-out">−</button>
    <span id="zoom-label">100%</span>
    <button class="zoom-btn" id="btn-zoom-reset">Fit</button>
    <button class="zoom-btn" id="btn-zoom-in">+</button>
</div>

<div id="status">Loading…</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const container   = document.getElementById('viewer-container');
    const pagesDiv    = document.getElementById('pages-container');
    const fileSelect  = document.getElementById('file-select');
    const pageCount   = document.getElementById('page-count');
    const zoomLabel   = document.getElementById('zoom-label');
    const statusEl    = document.getElementById('status');

    let pdfDoc    = null;
    let fitScale  = 1.0;
    let zoomLevel = 1.0;   // multiplier on top of fitScale

    const RENDER_DPR = Math.min(window.devicePixelRatio || 1, 2);

    function setStatus(t) { statusEl.textContent = t; }

    function effectiveScale() { return fitScale * zoomLevel; }

    function updateZoomLabel() {
        zoomLabel.textContent = Math.round(zoomLevel * 100) + '%';
    }

    // ── File list ────────────────────────────────────────────────────────────
    async function fetchFileList() {
        try {
            const res   = await fetch('/list');
            const files = await res.json();
            const pdfs  = files.filter(f => f.type === 'pdf');
            fileSelect.innerHTML = '';
            if (!pdfs.length) {
                fileSelect.innerHTML = '<option value="">No PDFs found</option>';
                setStatus('No PDFs'); return;
            }
            pdfs.forEach(f => {
                const o = document.createElement('option');
                o.value = f.id; o.textContent = f.name;
                fileSelect.appendChild(o);
            });
            fileSelect.value = pdfs[0].id;
            loadPDF(pdfs[0].id);
        } catch(e) { setStatus('Error loading list'); }
    }

    // ── Load PDF ─────────────────────────────────────────────────────────────
    async function loadPDF(docId) {
        if (!docId) return;
        setStatus('Loading…');
        pagesDiv.innerHTML = '';
        try {
            pdfDoc = await pdfjsLib.getDocument(`/file?id=${encodeURIComponent(docId)}`).promise;
            pageCount.textContent = `Pages: ${pdfDoc.numPages}`;

            // Calculate fit-width scale from first page
            const firstPage = await pdfDoc.getPage(1);
            const vp1 = firstPage.getViewport({ scale: 1 });
            const avail = container.clientWidth - 32;
            fitScale  = Math.max(0.3, avail / vp1.width);
            zoomLevel = 1.0;
            updateZoomLabel();

            await renderAllPages();
        } catch(e) { setStatus('Error: ' + e.message); }
    }

    // ── Render all pages ─────────────────────────────────────────────────────
    async function renderAllPages() {
        pagesDiv.innerHTML = '';
        setStatus('Rendering…');
        const scale = effectiveScale();

        for (let n = 1; n <= pdfDoc.numPages; n++) {
            const page     = await pdfDoc.getPage(n);
            const viewport = page.getViewport({ scale: scale * RENDER_DPR });

            const wrapper  = document.createElement('div');
            wrapper.className = 'page-wrapper';
            wrapper.style.width  = (viewport.width  / RENDER_DPR) + 'px';
            wrapper.style.height = (viewport.height / RENDER_DPR) + 'px';

            const canvas  = document.createElement('canvas');
            canvas.width  = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width  = (viewport.width  / RENDER_DPR) + 'px';
            canvas.style.height = (viewport.height / RENDER_DPR) + 'px';

            wrapper.appendChild(canvas);
            pagesDiv.appendChild(wrapper);

            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        }
        setStatus('Ready');
    }

    // ── Zoom helpers ─────────────────────────────────────────────────────────
    function changeZoom(newLevel) {
        const oldScrollRatio = container.scrollTop / (container.scrollHeight || 1);
        zoomLevel = Math.min(Math.max(newLevel, 0.25), 4.0);
        updateZoomLabel();
        renderAllPages().then(() => {
            container.scrollTop = oldScrollRatio * container.scrollHeight;
        });
    }

    document.getElementById('btn-zoom-in').addEventListener('click',  () => changeZoom(zoomLevel + 0.25));
    document.getElementById('btn-zoom-out').addEventListener('click', () => changeZoom(zoomLevel - 0.25));
    document.getElementById('btn-zoom-reset').addEventListener('click',() => changeZoom(1.0));
    fileSelect.addEventListener('change', e => loadPDF(e.target.value));

    // ── Pinch-to-zoom (touch) ────────────────────────────────────────────────
    let pinchStart   = 0;
    let pinchBase    = 1.0;
    let isPinching   = false;
    let pinchMidX    = 0;
    let pinchMidY    = 0;
    let pinchEndedAt = 0;

    container.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
            isPinching  = true;
            pinchStart  = Math.hypot(
                e.touches[1].clientX - e.touches[0].clientX,
                e.touches[1].clientY - e.touches[0].clientY
            );
            pinchBase = zoomLevel;
            const r = container.getBoundingClientRect();
            pinchMidX = ((e.touches[0].clientX + e.touches[1].clientX) / 2) - r.left + container.scrollLeft;
            pinchMidY = ((e.touches[0].clientY + e.touches[1].clientY) / 2) - r.top  + container.scrollTop;
            e.preventDefault();
        }
    }, { passive: false });

    container.addEventListener('touchmove', e => {
        if (!isPinching || e.touches.length < 2) return;
        e.preventDefault();
        const dist = Math.hypot(
            e.touches[1].clientX - e.touches[0].clientX,
            e.touches[1].clientY - e.touches[0].clientY
        );
        const raw = pinchBase * (dist / pinchStart);
        zoomLevel  = Math.min(Math.max(raw, 0.25), 4.0);
        updateZoomLabel();

        // Resize wrappers in-place (no re-render) for live feel
        const scale = effectiveScale();
        const wraps = pagesDiv.querySelectorAll('.page-wrapper');
        wraps.forEach(w => {
            const c = w.querySelector('canvas');
            const cssW = c.width  / RENDER_DPR;
            const cssH = c.height / RENDER_DPR;
            const scaleRatio = (scale * RENDER_DPR) / (c.width / (parseFloat(w.style.width)));
            // simpler: just scale width/height proportionally
            const ratio = zoomLevel / pinchBase;
            w.style.width  = (parseFloat(w.style.width)  * ratio / (zoomLevel / pinchBase > 1 ? ratio : ratio)) + 'px';
        });
        // Actually just apply direct layout scale
        applyLiveZoom(scale);
    }, { passive: false });

    // Live zoom during pinch (no re-render, just resize divs)
    function applyLiveZoom(targetScale) {
        const wraps = pagesDiv.querySelectorAll('.page-wrapper');
        wraps.forEach(w => {
            const canvas = w.querySelector('canvas');
            const displayW = canvas.width  / RENDER_DPR * (zoomLevel / pinchBase);
            const displayH = canvas.height / RENDER_DPR * (zoomLevel / pinchBase);
            w.style.width  = displayW + 'px';
            w.style.height = displayH + 'px';
        });
    }

    container.addEventListener('touchend', e => {
        if (isPinching && e.touches.length < 2) {
            isPinching   = false;
            pinchEndedAt = Date.now();
            // Commit: re-render at new zoom level for crisp output
            const savedScroll = container.scrollTop;
            const oldH = container.scrollHeight;
            renderAllPages().then(() => {
                container.scrollTop = savedScroll * (container.scrollHeight / (oldH || 1));
            });
        }
    }, { passive: true });

    // ── Ctrl-wheel zoom (desktop/emulator) ───────────────────────────────────
    container.addEventListener('wheel', e => {
        if (!e.ctrlKey) return;
        e.preventDefault();
        const delta = e.deltaY < 0 ? 0.15 : -0.15;
        changeZoom(zoomLevel + delta);
    }, { passive: false });

    // ── Double-tap zoom ──────────────────────────────────────────────────────
    let lastTap = 0;
    container.addEventListener('touchend', e => {
        if (isPinching || Date.now() - pinchEndedAt < 600) return;
        const now = Date.now();
        if (now - lastTap < 300) {
            changeZoom(zoomLevel > 1.05 ? 1.0 : 2.0);
        }
        lastTap = now;
    }, { passive: true });

    // ── Init ─────────────────────────────────────────────────────────────────
    fetchFileList();
</script>
</body>
</html>
