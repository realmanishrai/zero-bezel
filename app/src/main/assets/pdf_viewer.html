<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZeroBezel PDF Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
        }

        header {
            flex-shrink: 0;
            padding: 10px 16px;
            background: rgba(15,23,42,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .title-area { display: flex; align-items: center; gap: 10px; }

        h1 {
            font-size: 1.05rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        select {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            color: #f8fafc;
            padding: 6px 10px;
            border-radius: 8px;
            outline: none;
            font-size: 0.82rem;
            max-width: 180px;
        }
        select option { background: #1e293b; }

        /* ── SCROLL CONTAINER: must have a bounded height ── */
        #viewer-container {
            flex: 1 1 0;          /* takes remaining space */
            overflow: auto;       /* scroll both axes */
            -webkit-overflow-scrolling: touch;
            background: #0f172a;
            padding: 20px 12px 80px; /* bottom pad for zoom bar */
        }

        #pages-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .page-wrapper {
            background: white;
            border-radius: 6px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            overflow: hidden;
            flex-shrink: 0;
            /* width/height set by JS */
        }

        canvas { display: block; }

        /* ── ZOOM BAR ── */
        #zoom-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px 16px;
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
            gap: 0;
        }

        .zbtn {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            color: #f8fafc;
            padding: 9px 20px;
            font-size: 1.05rem;
            cursor: pointer;
            transition: background 0.15s;
            touch-action: manipulation;
        }
        .zbtn:first-child { border-radius: 8px 0 0 8px; }
        .zbtn:last-child  { border-radius: 0 8px 8px 0; }
        .zbtn:hover, .zbtn:active { background: rgba(56,189,248,0.25); }

        #zoom-label {
            border: 1px solid rgba(255,255,255,0.12);
            border-left: none; border-right: none;
            color: #94a3b8;
            padding: 9px 14px;
            font-size: 0.82rem;
            min-width: 58px;
            text-align: center;
            background: rgba(255,255,255,0.03);
        }

        #status {
            position: fixed;
            bottom: 58px;
            right: 14px;
            background: rgba(15,23,42,0.88);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4px 11px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #38bdf8;
            z-index: 200;
            pointer-events: none;
        }
    </style>
</head>
<body>

<header>
    <div class="title-area">
        <h1>📄 PDF</h1>
        <select id="file-select"><option value="">Loading…</option></select>
    </div>
    <span id="page-count" style="font-size:0.82rem;color:#64748b;">–</span>
</header>

<div id="viewer-container">
    <div id="pages-container"></div>
</div>

<div id="zoom-bar">
    <button class="zbtn" id="btn-out">−</button>
    <span id="zoom-label">100%</span>
    <button class="zbtn" id="btn-fit">Fit</button>
    <button class="zbtn" id="btn-in">+</button>
</div>

<div id="status">Loading…</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const container  = document.getElementById('viewer-container');
    const pagesDiv   = document.getElementById('pages-container');
    const fileSelect = document.getElementById('file-select');
    const pageCount  = document.getElementById('page-count');
    const zoomLabel  = document.getElementById('zoom-label');
    const statusEl   = document.getElementById('status');

    let pdfDoc    = null;
    let fitScale  = 1.0;
    let zoomLevel = 1.0;

    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    function status(t) { statusEl.textContent = t; }
    function effectiveScale() { return fitScale * zoomLevel; }
    function updateLabel() { zoomLabel.textContent = Math.round(zoomLevel * 100) + '%'; }

    // ── Fetch file list ──────────────────────────────────────────────────────
    async function fetchFileList() {
        try {
            const res   = await fetch('/list');
            const files = await res.json();
            const pdfs  = files.filter(f => f.type === 'pdf');
            fileSelect.innerHTML = '';
            if (!pdfs.length) {
                fileSelect.innerHTML = '<option>No PDFs found</option>';
                status('No PDFs'); return;
            }
            pdfs.forEach(f => {
                const o = document.createElement('option');
                o.value = f.id; o.textContent = f.name;
                fileSelect.appendChild(o);
            });
            fileSelect.value = pdfs[0].id;
            await loadPDF(pdfs[0].id);
        } catch(e) { status('Error: ' + e.message); }
    }

    // ── Load PDF ─────────────────────────────────────────────────────────────
    async function loadPDF(docId) {
        if (!docId) return;
        status('Loading…');
        pagesDiv.innerHTML = '';
        try {
            pdfDoc = await pdfjsLib.getDocument('/file?id=' + encodeURIComponent(docId)).promise;
            pageCount.textContent = pdfDoc.numPages + ' pages';

            const fp  = await pdfDoc.getPage(1);
            const vp1 = fp.getViewport({ scale: 1 });
            fitScale  = Math.max(0.3, (container.clientWidth - 24) / vp1.width);
            zoomLevel = 1.0;
            updateLabel();

            await renderAll();
        } catch(e) { status('Error: ' + e.message); }
    }

    // ── Render all pages ─────────────────────────────────────────────────────
    async function renderAll() {
        pagesDiv.innerHTML = '';
        status('Rendering…');
        const sc = effectiveScale();

        for (let n = 1; n <= pdfDoc.numPages; n++) {
            const page = await pdfDoc.getPage(n);
            const vp   = page.getViewport({ scale: sc * DPR });

            const wrap = document.createElement('div');
            wrap.className = 'page-wrapper';
            wrap.style.width  = (vp.width  / DPR) + 'px';
            wrap.style.height = (vp.height / DPR) + 'px';

            const cv  = document.createElement('canvas');
            cv.width  = vp.width;
            cv.height = vp.height;
            cv.style.width  = (vp.width  / DPR) + 'px';
            cv.style.height = (vp.height / DPR) + 'px';

            wrap.appendChild(cv);
            pagesDiv.appendChild(wrap);

            await page.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
        }
        status('Ready');
    }

    // ── Zoom ─────────────────────────────────────────────────────────────────
    async function setZoom(newLevel) {
        if (!pdfDoc) return;
        const ratio = container.scrollTop / (container.scrollHeight || 1);
        zoomLevel = Math.min(Math.max(newLevel, 0.25), 4.0);
        updateLabel();
        await renderAll();
        container.scrollTop = ratio * container.scrollHeight;
    }

    document.getElementById('btn-in') .addEventListener('click', () => setZoom(zoomLevel + 0.25));
    document.getElementById('btn-out').addEventListener('click', () => setZoom(zoomLevel - 0.25));
    document.getElementById('btn-fit').addEventListener('click', () => setZoom(1.0));
    fileSelect.addEventListener('change', e => loadPDF(e.target.value));

    // ── Pinch to zoom ────────────────────────────────────────────────────────
    let pinchDist0   = 0;
    let pinchZoom0   = 1.0;
    let pinching     = false;
    let pinchEndTime = 0;

    container.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
            pinching  = true;
            pinchDist0 = Math.hypot(
                e.touches[1].clientX - e.touches[0].clientX,
                e.touches[1].clientY - e.touches[0].clientY);
            pinchZoom0 = zoomLevel;
            e.preventDefault();
        }
    }, { passive: false });

    container.addEventListener('touchmove', e => {
        if (!pinching || e.touches.length < 2) return;
        e.preventDefault();
        const d = Math.hypot(
            e.touches[1].clientX - e.touches[0].clientX,
            e.touches[1].clientY - e.touches[0].clientY);
        // Live: just resize existing wrappers (no re-render)
        const newZoom  = Math.min(Math.max(pinchZoom0 * (d / pinchDist0), 0.25), 4.0);
        const ratio    = newZoom / zoomLevel;
        zoomLevel      = newZoom;
        updateLabel();
        document.querySelectorAll('.page-wrapper').forEach(w => {
            w.style.width  = (parseFloat(w.style.width)  * ratio) + 'px';
            w.style.height = (parseFloat(w.style.height) * ratio) + 'px';
        });
    }, { passive: false });

    container.addEventListener('touchend', e => {
        if (pinching && e.touches.length < 2) {
            pinching     = false;
            pinchEndTime = Date.now();
            // Re-render at committed zoom for crisp result
            const ratio = container.scrollTop / (container.scrollHeight || 1);
            renderAll().then(() => { container.scrollTop = ratio * container.scrollHeight; });
        }
    }, { passive: true });

    // ── Double-tap zoom ──────────────────────────────────────────────────────
    let lastTap = 0;
    container.addEventListener('touchend', e => {
        if (pinching || Date.now() - pinchEndTime < 500) return;
        const now = Date.now();
        if (now - lastTap < 280) setZoom(zoomLevel > 1.1 ? 1.0 : 2.0);
        lastTap = now;
    }, { passive: true });

    // ── Ctrl+wheel (desktop) ─────────────────────────────────────────────────
    container.addEventListener('wheel', e => {
        if (!e.ctrlKey) return;
        e.preventDefault();
        setZoom(zoomLevel + (e.deltaY < 0 ? 0.15 : -0.15));
    }, { passive: false });

    // ── Init ─────────────────────────────────────────────────────────────────
    fetchFileList();
</script>
</body>
</html>
