<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 200%;  /* Double width for split view */
            height: 100vh; 
            overflow: hidden; 
            background: #000;
            color: white;
        }
        #viewport {
            width: 200vw;  /* Spans both devices */
            height: 100vh;
            position: relative;
            overflow: auto;
        }
        #content {
            width: 100%;
            min-height: 100%;
        }
        img, video {
            width: 100%;
            height: auto;
            display: block;
        }
        #pdf-container {
            width: 100%;
        }
        .debug { 
            position: fixed; 
            top: 10px; 
            left: 10px; 
            background: rgba(255,0,0,0.7); 
            color: white; 
            padding: 5px; 
            z-index: 9999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="debug" id="debug">Loading...</div>
    <div id="viewport">
        <div id="content">
            <div id="pdf-container"></div>
        </div>
    </div>

    <script>
        console.log('HTML Loaded');

        // Parse URL parameters
        const params = new URLSearchParams(window.location.search);
        const fileParam = params.get('file');
        const fileUrl = fileParam ? decodeURIComponent(fileParam) : '';
        const fileType = params.get('type');
        const isClient = params.get('role') === 'client';

        const debug = document.getElementById('debug');
        const content = document.getElementById('content');
        const viewport = document.getElementById('viewport');

        console.log('File URL:', fileUrl);
        console.log('File Type:', fileType);
        console.log('Is Client:', isClient);

        debug.textContent = `Type: ${fileType}, URL: ${fileUrl}, Role: ${isClient ? 'Client' : 'Host'}`;

        // Load content based on type
        async function loadContent() {
            if (!fileUrl) {
                console.error('❌ No file URL provided');
                debug.textContent = 'ERROR: No file URL';
                return;
            }
            if (fileType === 'image') {
                console.log('Creating image element with src:', fileUrl);
                const img = document.createElement('img');
                img.src = fileUrl;
                img.crossOrigin = "anonymous";
                img.onload = () => {
                    console.log('✅ Image loaded successfully, natural width:', img.naturalWidth, 'height:', img.naturalHeight);
                    debug.textContent = 'Loaded: ' + img.naturalWidth + 'x' + img.naturalHeight;
                    content.appendChild(img);
                    setupImageSync();
                    
                    if (isClient) {
                        viewport.style.transform = 'translateX(-100vw)';
                    }
                };
                img.onerror = (e) => {
                    console.error('❌ Image failed to load:', e);
                    debug.textContent = 'FAILED: ' + fileUrl;
                };
            } 
            else if (fileType === 'video') {
                console.log('Creating video element with src:', fileUrl);
                const video = document.createElement('video');
                video.src = fileUrl;
                video.controls = true;
                video.crossOrigin = "anonymous";
                video.onloadeddata = () => {
                    console.log('✅ Video loaded successfully - duration: ' + video.duration + 's');
                    debug.textContent = 'Video loaded - duration: ' + video.duration + 's';
                    content.appendChild(video);
                    setupVideoSync();
                    
                    if (isClient) {
                        viewport.style.transform = 'translateX(-100vw)';
                    }
                };
                video.onerror = (e) => {
                    console.error('❌ Video failed to load:', e);
                    debug.textContent = 'FAILED: ' + fileUrl;
                };
            }
            else if (fileType === 'pdf') {
                console.log('Loading PDF from URL:', fileUrl);
                debug.textContent = 'Loading PDF...';
                await loadPDF(fileUrl);
            }
        }

        async function loadPDF(url) {
            try {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(url).promise;
                console.log('✅ PDF loaded successfully:', pdf.numPages, 'pages');
                debug.textContent = `PDF loaded: ${pdf.numPages} pages`;
                
                // Render first page for MVP
                const page = await pdf.getPage(1);
                const scale = 1.5;
                const pageViewport = page.getViewport({ scale });
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = pageViewport.height;
                canvas.width = pageViewport.width;
                
                await page.render({ canvasContext: context, viewport: pageViewport }).promise;
                console.log('✅ PDF page 1 rendered successfully');
                
                let container = document.getElementById('pdf-container');
                if (!container) {
                    container = document.createElement('div');
                    container.id = 'pdf-container';
                }
                container.appendChild(canvas);
                content.appendChild(container);
                
                setupPDFSync(pdf);

                if (isClient) {
                    viewport.style.transform = 'translateX(-100vw)';
                }
            } catch (err) {
                console.error('❌ PDF loading/rendering failed:', err);
                debug.textContent = 'PDF ERROR: ' + err.message;
            }
        }

        // Sync functions - send events to Android
        function setupImageSync() {
            viewport.addEventListener('scroll', () => {
                if (window.Android && window.Android.onSyncEvent) {
                    window.Android.onSyncEvent(JSON.stringify({
                        type: 'scroll',
                        x: viewport.scrollLeft,
                        y: viewport.scrollTop
                    }));
                }
            });
        }

        function setupVideoSync() {
            const video = content.querySelector('video');
            if (!video) return;
            video.addEventListener('timeupdate', () => {
                if (window.Android && window.Android.onSyncEvent && !video.paused) {
                    window.Android.onSyncEvent(JSON.stringify({
                        type: 'video',
                        time: video.currentTime,
                        paused: video.paused
                    }));
                }
            });
            video.addEventListener('play', () => {
                if (window.Android && window.Android.onSyncEvent) {
                    window.Android.onSyncEvent(JSON.stringify({ type: 'video', action: 'play', time: video.currentTime }));
                }
            });
            video.addEventListener('pause', () => {
                if (window.Android && window.Android.onSyncEvent) {
                    window.Android.onSyncEvent(JSON.stringify({ type: 'video', action: 'pause', time: video.currentTime }));
                }
            });
        }

        async function setupPDFSync(pdf) {
            viewport.addEventListener('scroll', () => {
                if (window.Android && window.Android.onSyncEvent) {
                    window.Android.onSyncEvent(JSON.stringify({
                        type: 'scroll',
                        y: viewport.scrollTop
                    }));
                }
            });
        }

        // Receive sync events from Android
        window.applySync = function(event) {
            try {
                const data = typeof event === 'string' ? JSON.parse(event) : event;
                
                if (data.type === 'scroll') {
                    viewport.scrollTo({ left: data.x || 0, top: data.y || 0, behavior: 'smooth' });
                }
                else if (data.type === 'video') {
                    const video = content.querySelector('video');
                    if (video) {
                        if (Math.abs(video.currentTime - data.time) > 0.5) {
                            video.currentTime = data.time;
                        }
                        if (data.action === 'play' && video.paused) video.play();
                        if (data.action === 'pause' && !video.paused) video.pause();
                    }
                }
            } catch (e) {
                console.error('Sync error:', e);
            }
        }

        // Initialize
        window.addEventListener('load', loadContent);
    </script>
</body>
</html>
