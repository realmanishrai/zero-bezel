<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZeroBezel Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(160deg, #020617 0%, #0f172a 100%);
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ──────────────────────────────────────────────────────── */
        header {
            flex-shrink: 0;
            padding: 14px 18px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #img-count {
            font-size: 0.78rem;
            color: #64748b;
            margin-left: auto;
        }

        /* ── Gallery grid ────────────────────────────────────────────────── */
        #grid-scroll {
            flex: 1 1 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .thumb-card {
            position: relative;
            aspect-ratio: 1;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
        }

        .thumb-card:active {
            transform: scale(0.94);
        }

        .thumb-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s;
        }

        /* subtle shimmer while loading */
        .thumb-card img[data-loading="true"] {
            opacity: 0;
        }

        .thumb-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(56,189,248,0.2);
            border-color: rgba(56,189,248,0.35);
        }

        /* ── LIGHTBOX ────────────────────────────────────────────────────── */
        #lightbox {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            flex-direction: column;
            /* hidden by default */
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.22s ease, visibility 0s linear 0.22s;
        }

        #lightbox.open {
            visibility: visible;
            opacity: 1;
            transition: opacity 0.22s ease, visibility 0s linear 0s;
        }

        /* top bar */
        #lb-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            z-index: 10;
        }

        #lb-title {
            flex: 1;
            font-size: 0.88rem;
            color: #cbd5e1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #lb-counter {
            font-size: 0.78rem;
            color: #64748b;
            white-space: nowrap;
        }

        .lb-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff;
            padding: 7px 13px;
            border-radius: 8px;
            font-size: 0.82rem;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .lb-btn:hover { background: rgba(255,255,255,0.18); }
        #lb-close {
            background: rgba(239,68,68,0.18);
            border-color: rgba(239,68,68,0.3);
        }
        #lb-close:hover { background: rgba(239,68,68,0.35); }

        /* image stage — where swipe & pinch happen */
        #lb-stage {
            flex: 1 1 0;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;   /* we handle all touch ourselves */
        }

        #lb-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
            will-change: transform;
            /* transform set by JS */
        }

        /* arrow nav buttons (desktop / tablet only) */
        .lb-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.75);
            width: 46px;
            height: 46px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: background 0.15s, color 0.15s;
        }
        .lb-arrow:hover {
            background: rgba(56,189,248,0.3);
            color: #fff;
        }
        #lb-prev { left: 14px; }
        #lb-next { right: 14px; }

        /* bottom strip on lightbox */
        #lb-bottom {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transition: background 0.2s, transform 0.2s;
            cursor: pointer;
        }
        .dot.active {
            background: #38bdf8;
            transform: scale(1.35);
        }

        #status {
            position: fixed;
            bottom: 56px;
            right: 14px;
            background: rgba(15,23,42,0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 4px 11px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #38bdf8;
            z-index: 500;
            pointer-events: none;
        }
    </style>
</head>
<body>

<header>
    <h1>🖼️ Gallery</h1>
    <span id="img-count"></span>
</header>

<div id="grid-scroll">
    <div id="grid"></div>
</div>

<!-- ── LIGHTBOX ─────────────────────────────────────────────────────── -->
<div id="lightbox">
    <div id="lb-bar">
        <span id="lb-title">Image</span>
        <span id="lb-counter">1 / 1</span>
        <button class="lb-btn" id="lb-close">✕ Close</button>
    </div>

    <div id="lb-stage">
        <img id="lb-img" src="" alt="">
        <button class="lb-arrow" id="lb-prev">&#8249;</button>
        <button class="lb-arrow" id="lb-next">&#8250;</button>
    </div>

    <div id="lb-bottom" id="lb-dots"></div>
</div>

<div id="status">Loading…</div>

<script>
// ── Data ───────────────────────────────────────────────────────────────────
let images       = [];   // [{id, name}]
let lbIndex      = 0;    // current lightbox index
let lbOpen       = false;

// ── DOM refs ───────────────────────────────────────────────────────────────
const grid      = document.getElementById('grid');
const gridScroll= document.getElementById('grid-scroll');
const imgCount  = document.getElementById('img-count');
const statusEl  = document.getElementById('status');

const lightbox  = document.getElementById('lightbox');
const lbImg     = document.getElementById('lb-img');
const lbTitle   = document.getElementById('lb-title');
const lbCounter = document.getElementById('lb-counter');
const lbClose   = document.getElementById('lb-close');
const lbPrev    = document.getElementById('lb-prev');
const lbNext    = document.getElementById('lb-next');
const lbBottom  = document.getElementById('lb-bottom');

function setStatus(t) { statusEl.textContent = t; }

// ── Fetch images ───────────────────────────────────────────────────────────
async function fetchGallery() {
    try {
        const res  = await fetch('/list');
        const all  = await res.json();
        images     = all.filter(f => f.type === 'image');
        buildGrid();
        setStatus(images.length ? 'Ready' : 'No images found');
    } catch(e) {
        setStatus('Error loading gallery');
    }
}

function buildGrid() {
    grid.innerHTML = '';
    lbBottom.innerHTML = '';
    imgCount.textContent = `${images.length} photo${images.length !== 1 ? 's' : ''}`;

    images.forEach((img, i) => {
        // Thumbnail card
        const card = document.createElement('div');
        card.className = 'thumb-card';

        const el = document.createElement('img');
        el.alt = img.name;
        el.setAttribute('data-loading', 'true');
        el.addEventListener('load', () => {
            el.removeAttribute('data-loading');
            el.style.opacity = '1';
        });
        el.src = `/file?id=${encodeURIComponent(img.id)}`;
        el.loading = 'lazy';

        card.appendChild(el);

        // Open lightbox on tap/click
        card.addEventListener('click', () => openLightbox(i));

        // Prevent double-tap browser zoom on card
        card.addEventListener('touchend', e => { e.preventDefault(); openLightbox(i); },
            { passive: false });

        grid.appendChild(card);

        // Dot indicator for lightbox
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.dataset.index = i;
        dot.addEventListener('click', () => navigateTo(i));
        lbBottom.appendChild(dot);
    });
}

// ── Lightbox open/close ────────────────────────────────────────────────────
function openLightbox(index) {
    lbOpen  = true;
    lbIndex = index;
    resetTransform();
    lightbox.classList.add('open');
    loadLbImage(index);
}

function closeLightbox() {
    lbOpen = false;
    lightbox.classList.remove('open');
    resetTransform();
}

lbClose.addEventListener('click', closeLightbox);

function loadLbImage(index) {
    const img       = images[index];
    lbTitle.textContent   = img.name;
    lbCounter.textContent = `${index + 1} / ${images.length}`;
    lbImg.src             = `/file?id=${encodeURIComponent(img.id)}`;
    lbPrev.style.display  = index > 0 ? 'flex' : 'none';
    lbNext.style.display  = index < images.length - 1 ? 'flex' : 'none';
    updateDots(index);
}

function updateDots(index) {
    lbBottom.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === index);
    });
}

// ── Navigation ─────────────────────────────────────────────────────────────
function navigateTo(newIndex, direction) {
    if (newIndex < 0 || newIndex >= images.length) return;
    if (!direction) direction = newIndex > lbIndex ? 'left' : 'right';

    // Animate out
    const outX = direction === 'left' ? -window.innerWidth : window.innerWidth;
    lbImg.style.transition = 'transform 0.22s ease-out, opacity 0.22s ease-out';
    lbImg.style.transform  = `translate(${outX}px, 0) scale(1)`;
    lbImg.style.opacity    = '0';

    setTimeout(() => {
        lbIndex = newIndex;
        resetTransform(false);
        const inX = direction === 'left' ? window.innerWidth : -window.innerWidth;
        lbImg.style.transition = 'none';
        lbImg.style.transform  = `translate(${inX}px, 0) scale(1)`;
        lbImg.style.opacity    = '0';
        loadLbImage(newIndex);

        // Force reflow then animate in
        lbImg.getBoundingClientRect();
        lbImg.style.transition = 'transform 0.22s ease-out, opacity 0.22s ease-out';
        lbImg.style.transform  = 'translate(0, 0) scale(1)';
        lbImg.style.opacity    = '1';
    }, 220);
}

lbPrev.addEventListener('click', () => navigateTo(lbIndex - 1, 'right'));
lbNext.addEventListener('click', () => navigateTo(lbIndex + 1, 'left'));

// keyboard
document.addEventListener('keydown', e => {
    if (!lbOpen) return;
    if (e.key === 'ArrowLeft')  navigateTo(lbIndex - 1, 'right');
    if (e.key === 'ArrowRight') navigateTo(lbIndex + 1, 'left');
    if (e.key === 'Escape')     closeLightbox();
});

// ── Transform state ────────────────────────────────────────────────────────
let tx = 0, ty = 0, scale = 1;

function applyTransform(animated) {
    lbImg.style.transition = animated ? 'transform 0.2s ease-out' : 'none';
    lbImg.style.transform  = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

function resetTransform(applyNow = true) {
    tx = 0; ty = 0; scale = 1;
    lbImg.style.opacity = '1';
    if (applyNow) applyTransform(true);
}

function clamp() {
    if (scale <= 1) { tx = 0; ty = 0; return; }
    const w = lbImg.clientWidth  * scale;
    const h = lbImg.clientHeight * scale;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const maxX = Math.max(0, (w - vw) / 2);
    const maxY = Math.max(0, (h - vh) / 2);
    tx = Math.min(Math.max(tx, -maxX), maxX);
    ty = Math.min(Math.max(ty, -maxY), maxY);
}

// ── Touch handling on lb-stage ─────────────────────────────────────────────
const stage = document.getElementById('lb-stage');

let touches      = {};          // map touchId → {x,y}
let gesture      = null;        // 'pan' | 'swipe' | 'pinch' | 'dismiss'
let gestureStartTx = 0;
let gestureStartTy = 0;
let gestureStartX  = 0;
let gestureStartY  = 0;

// pinch
let pinchStartDist  = 0;
let pinchStartScale = 1;

function touchCount() { return Object.keys(touches).length; }

stage.addEventListener('touchstart', e => {
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t => {
        touches[t.identifier] = { x: t.clientX, y: t.clientY };
    });

    const ids = Object.keys(touches);
    if (ids.length === 1) {
        const t = touches[ids[0]];
        gestureStartTx = tx;
        gestureStartTy = ty;
        gestureStartX  = t.x;
        gestureStartY  = t.y;
        gesture        = null;
    } else if (ids.length === 2) {
        gesture = 'pinch';
        const [a, b] = ids.map(id => touches[id]);
        pinchStartDist  = Math.hypot(b.x - a.x, b.y - a.y);
        pinchStartScale = scale;
    }
}, { passive: false });

stage.addEventListener('touchmove', e => {
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t => {
        if (touches[t.identifier]) {
            touches[t.identifier] = { x: t.clientX, y: t.clientY };
        }
    });

    const ids = Object.keys(touches);

    if (ids.length === 2 && gesture === 'pinch') {
        const [a, b] = ids.map(id => touches[id]);
        const dist  = Math.hypot(b.x - a.x, b.y - a.y);
        scale = Math.min(Math.max(pinchStartScale * (dist / pinchStartDist), 0.5), 6);
        clamp();
        applyTransform(false);
        return;
    }

    if (ids.length === 1) {
        const t = touches[ids[0]];
        const dx = t.x - gestureStartX;
        const dy = t.y - gestureStartY;

        if (!gesture) {
            if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
                if (scale > 1.02) {
                    gesture = 'pan';
                } else if (Math.abs(dx) >= Math.abs(dy)) {
                    gesture = 'swipe';
                } else {
                    gesture = 'dismiss';
                }
            }
        }

        if (gesture === 'pan') {
            tx = gestureStartTx + dx;
            ty = gestureStartTy + dy;
            clamp();
            applyTransform(false);
        } else if (gesture === 'swipe') {
            tx = dx;
            ty = 0;
            lbImg.style.transition = 'none';
            lbImg.style.transform  = `translate(${tx}px, 0) scale(1)`;
        } else if (gesture === 'dismiss') {
            ty = dy;
            const fade = Math.max(0, 1 - Math.abs(dy) / (window.innerHeight * 0.45));
            lbImg.style.transition = 'none';
            lbImg.style.transform  = `translate(0, ${ty}px) scale(1)`;
            lightbox.style.background = `rgba(0,0,0,${fade})`;
        }
    }
}, { passive: false });

stage.addEventListener('touchend', e => {
    Array.from(e.changedTouches).forEach(t => delete touches[t.identifier]);
    const remainingCount = Object.keys(touches).length;

    if (gesture === 'pinch' && remainingCount < 2) {
        gesture = null;
        if (scale < 1.05) { scale = 1; tx = 0; ty = 0; applyTransform(true); }
        return;
    }

    if (gesture === 'swipe') {
        const finalDx = tx;
        tx = 0;
        if (finalDx < -70 && lbIndex < images.length - 1) {
            navigateTo(lbIndex + 1, 'left');
        } else if (finalDx > 70 && lbIndex > 0) {
            navigateTo(lbIndex - 1, 'right');
        } else {
            // snap back
            lbImg.style.transition = 'transform 0.2s ease-out';
            lbImg.style.transform  = 'translate(0, 0) scale(1)';
        }
        gesture = null;
        return;
    }

    if (gesture === 'dismiss') {
        const finalDy = ty;
        lightbox.style.background = '';
        if (Math.abs(finalDy) > window.innerHeight * 0.22) {
            closeLightbox();
        } else {
            ty = 0;
            applyTransform(true);
        }
        gesture = null;
        return;
    }

    gesture = null;
}, { passive: true });

// ── Double-tap zoom ────────────────────────────────────────────────────────
let lastTapT = 0;
let lastTapX = 0, lastTapY = 0;

stage.addEventListener('touchend', e => {
    if (gesture) return;
    const t   = e.changedTouches[0];
    const now = Date.now();
    if (now - lastTapT < 280 && Object.keys(touches).length === 0) {
        e.preventDefault();
        if (scale > 1.05) {
            resetTransform(true);
        } else {
            // zoom 2.5× toward tap point
            const r    = lbImg.getBoundingClientRect();
            const ox   = (t.clientX - r.left - r.width  / 2) * 1;
            const oy   = (t.clientY - r.top  - r.height / 2) * 1;
            scale = 2.5;
            tx = -ox * (scale - 1);
            ty = -oy * (scale - 1);
            clamp();
            applyTransform(true);
        }
        lastTapT = 0;
        return;
    }
    lastTapT = now;
    lastTapX = t.clientX;
    lastTapY = t.clientY;
}, { passive: false });

// ── Init ───────────────────────────────────────────────────────────────────
fetchGallery();
</script>
</body>
</html>
